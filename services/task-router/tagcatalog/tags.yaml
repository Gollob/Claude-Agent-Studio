# tagcatalog/tags.yaml — реестр тегов task-router
# Источник истины для инвертированного in-memory индекса.
# ONLY skill-curator может изменять этот файл.
# Seed: 9 агентов × ~16 тегов × 31 навык.
# Полный перебор 76 скилов из .claude/skills/ не сделан;
# охвачены все агенты репрезентативно (>=25 навыков).

# ─────────────────────────────────────────────
# ТЕГИ
# canon  — каноническое имя (lower-case, без #)
# aliases — синонимы (нормализуются -> canon)
# domain  — golang|python|typescript|db|devops|docs|qa|review|orchestration|security
# weight  — вес при скоринге (по умолчанию 1.0)
# ─────────────────────────────────────────────
tags:
  - canon: go
    aliases: [golang, "go-lang"]
    domain: golang
    description: "Go-разработка (сервисы, инструменты, библиотеки)"
    weight: 1.2
    is_active: true

