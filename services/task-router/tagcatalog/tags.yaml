# ─────────────────────────────────────────────
# АГЕНТЫ
# agent   — имя агента (совпадает с именем субагента)
# model   — модель Claude (opus|sonnet)
# zone    — краткое описание зоны ответственности
# heavy   — 1 если Opus (тяжёлый по токенам), 0 если Sonnet
# is_active
# ─────────────────────────────────────────────
agents:
  - agent: architect
    model: opus
    zone: "Архитектура: дизайн системы ДО кода, spec-driven (OpenSpec), ADR, декомпозиция"
    heavy: 1
    is_active: true

  - agent: python-dev
    model: sonnet
    zone: "Python: микросервисы (FastAPI/async), скрипты"
    heavy: 0
    is_active: true

  - agent: go-dev
    model: opus
    zone: "Go: высоконагруженные сервисы, конкурентность"
    heavy: 1
    is_active: true

  - agent: ts-dev
    model: sonnet
    zone: "Фронтенд TypeScript/React, Next.js"
    heavy: 0
    is_active: true

  - agent: reviewer
    model: sonnet
    zone: "Независимое ревью кода (read-only)"
    heavy: 0
    is_active: true

  - agent: devops
    model: sonnet
    zone: "Docker/Compose, деплой, systemd, nginx, CI"
    heavy: 0
    is_active: true

  - agent: db-engineer
    model: sonnet
    zone: "ClickHouse: схемы, оптимизация, ETL"
    heavy: 0
    is_active: true

  - agent: docs
    model: sonnet
    zone: "Конспекты kb/, README, ADR"
    heavy: 0
    is_active: true

  - agent: qa-test
    model: sonnet
    zone: "Тесты pytest / go test / Vitest / Playwright"
    heavy: 0
    is_active: true

